name: Build ZenvX OS ISO

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths:
      - "zenvx-iso/**"
      - "zenvx-os/**"
      - ".github/workflows/build-iso.yml"
  pull_request:
    paths:
      - "zenvx-iso/**"
      - "zenvx-os/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-iso:
    name: Build ISO (live-build, Debian container)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: debian:bookworm
      options: --privileged

    steps:
      - name: Install build dependencies
        run: |
          set -eux
          apt-get update
          apt-get install -y --no-install-recommends \
            live-build debootstrap squashfs-tools xorriso \
            isolinux syslinux syslinux-common syslinux-utils \
            grub-pc-bin grub-efi-amd64-bin mtools \
            dosfstools ca-certificates curl git debian-archive-keyring procps rsync
          lb --version || true
          echo 'Free disk space:'; df -h

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git safe.directory
        shell: bash
        run: |
          set -eux
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory '*'

      - name: Print build target commit
        shell: bash
        run: |
          set -eux
          echo "GITHUB_SHA=$GITHUB_SHA"
          git rev-parse HEAD
          git log -1 --oneline

      - name: Stage ZenvX application source into the image
        shell: bash
        run: |
          set -eux
          dest=zenvx-iso/config/includes.chroot/opt/zenvx
          mkdir -p "$dest"
          cp -a zenvx-os/. "$dest"/

      - name: Make build scripts executable
        working-directory: zenvx-iso
        run: |
          chmod +x auto/config auto/build auto/clean || true
          find config/hooks -type f -name "*.hook.*" -print0 | xargs -0r chmod +x || true
          find config/includes.chroot/usr/local/bin -type f -print0 | xargs -0r chmod +x || true
          find config/includes.chroot/usr/share/plymouth -type f -name "*.script" -print0 | xargs -0r chmod +x || true

      - name: Build the ISO
        working-directory: zenvx-iso
        shell: bash
        run: |
          set -ux
          lb config
          set +e
          lb build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          set -e
          echo "lb build exit status: $status"
          echo "$status" > build.status
          if [ "$status" -ne 0 ]; then
            echo "===================== live-build errors (E:/W:) ====================="
            grep -nE '^(E|W):' build.log | tail -n 200 || true
            echo "===================== last 200 lines of build.log =================="
            tail -n 200 build.log || true
          fi

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            zenvx-iso/build.log
            zenvx-iso/build.status
          if-no-files-found: ignore

      - name: Commit build log back to repo (for diagnosis)
        if: always()
        shell: bash
        env:
          GH_TOKEN: $ github.token 
        run: |
          set -eux
          # Attribute these commits to the official GitHub Actions bot.
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          mkdir -p ci-logs
          cp zenvx-iso/build.log ci-logs/latest-build.txt 2>/dev/null || echo 'no build.log produced' > ci-logs/latest-build.txt
          tail -c 250000 zenvx-iso/build.log > ci-logs/latest-build.tail.txt 2>/dev/null || true
          cp zenvx-iso/build.status ci-logs/latest-build.status 2>/dev/null || true
          grep -nE '^(E|W):' zenvx-iso/build.log | tail -n 200 > ci-logs/latest-build.error.txt 2>/dev/null || true

          git add -f ci-logs/latest-build.txt ci-logs/latest-build.tail.txt ci-logs/latest-build.status ci-logs/latest-build.error.txt || true
          git commit -m 'ci: build log [skip ci]' || true

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main || true

      - name: Fail job if build failed
        shell: bash
        run: |
          status=$(cat zenvx-iso/build.status 2>/dev/null || echo 1)
          if [ "$status" != "0" ]; then
            echo "lb build failed with status $status"
            exit 1
          fi

      - name: Locate and rename the ISO
        working-directory: zenvx-iso
        shell: bash
        run: |
          set -eu
          ISO=$(ls -1 *.iso live-image-*.iso 2>/dev/null | head -n1 || true)
          if [ -z "$ISO" ]; then
            echo "No ISO produced!"
            ls -la
            exit 1
          fi
          OUT="zenvx-os-v1.0.0-amd64.iso"
          mv "$ISO" "$OUT"
          sha256sum "$OUT" > "$OUT.sha256"
          echo "Built: $OUT"
          ls -lh "$OUT"

      - name: Upload ISO as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenvx-os-iso
          path: |
            zenvx-iso/*.iso
            zenvx-iso/*.iso.sha256
          retention-days: 30
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: ZenvX OS v1.0.0
          files: |
            zenvx-iso/*.iso
            zenvx-iso/*.iso.sha256
          fail_on_unmatched_files: true
          body: |
            Automated ZenvX OS live ISO build.

            Flash to USB (Linux/macOS):
            `sudo dd if=zenvx-os-v1.0.0-amd64.iso of=/dev/sdX bs=4M status=progress oflag=sync`

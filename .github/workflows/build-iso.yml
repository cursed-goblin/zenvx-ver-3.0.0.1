name: Build ZenvX OS ISO

# Builds the live ISO on a GitHub-hosted Ubuntu runner using live-build,
# then publishes the ISO as a workflow artifact and (on tags) a release.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths:
      - "zenvx-iso/**"
      - "zenvx-os/**"
      - ".github/workflows/build-iso.yml"
  pull_request:
    paths:
      - "zenvx-iso/**"
      - "zenvx-os/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-iso:
    name: Build ISO (live-build)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          echo "Disk after cleanup:"
          df -h /

      - name: Install live-build toolchain
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            live-build debootstrap squashfs-tools xorriso \
            isolinux syslinux-common grub-pc-bin grub-efi-amd64-bin mtools \
            debian-archive-keyring ca-certificates curl
          lb --version || true

      - name: Make build scripts executable
        working-directory: zenvx-iso
        run: |
          chmod +x auto/config auto/build auto/clean || true
          find config/hooks -type f -name "*.hook.*" -print0 | xargs -0r chmod +x || true
          find config/includes.chroot/usr/local/bin -type f -print0 | xargs -0r chmod +x || true
          find config/includes.chroot/usr/share/plymouth -type f -name "*.script" -print0 | xargs -0r chmod +x || true

      - name: Build the ISO
        working-directory: zenvx-iso
        run: |
          set -euxo pipefail
          sudo lb config
          sudo lb build 2>&1 | tee build.log

      - name: Locate and rename the ISO
        working-directory: zenvx-iso
        run: |
          set -euo pipefail
          ISO=$(ls -1 *.iso live-image-*.iso 2>/dev/null | head -n1 || true)
          if [ -z "$ISO" ]; then
            echo "No ISO produced!" >&2
            ls -la
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME:-dev}"
          OUT="zenvx-os-${VERSION}-amd64.iso"
          mv "$ISO" "$OUT"
          sha256sum "$OUT" > "$OUT.sha256"
          echo "Built: $OUT ($(du -h "$OUT" | cut -f1))"

      - name: Upload ISO as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenvx-os-iso
          path: |
            zenvx-iso/*.iso
            zenvx-iso/*.iso.sha256
          retention-days: 30
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: zenvx-iso/build.log
          if-no-files-found: ignore

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zenvx-iso/*.iso
            zenvx-iso/*.iso.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Automated ZenvX OS live ISO build.

            - Hybrid BIOS + UEFI bootable image
            - SHA256 checksum attached

            Flash with:
            `sudo dd if=zenvx-os-*.iso of=/dev/sdX bs=4M status=progress oflag=sync`

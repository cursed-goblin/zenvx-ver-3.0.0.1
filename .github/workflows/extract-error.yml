name: Extract build error

# Lightweight helper: reads the already-committed full build log
# (ci-logs/latest-build.txt) and writes a small summary with the E:/W: error
# lines and the last lines of the log, so the actual failure is easy to read
# without re-running the ~20 minute ISO build. Triggered just by pushing this
# file (path filter), so it does NOT re-run the heavy build workflow.

on:
  push:
    paths:
      - ".github/workflows/extract-error.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract error summary from committed log
        shell: bash
        run: |
          set -ux
          IN=ci-logs/latest-build.txt
          OUT=ci-logs/latest-build.error.txt
          mkdir -p ci-logs
          if [ ! -f "$IN" ]; then
            echo "No committed build log found at $IN" > "$OUT"
            exit 0
          fi
          {
            echo '===================== E:/W: error lines ====================='
            grep -nE '^(E|W):' "$IN" || echo '(no E:/W: lines found)'
            echo
            echo '===================== last 150 lines ====================='
            tail -n 150 "$IN"
          } > "$OUT"

      - name: Commit error summary
        shell: bash
        run: |
          set -ux
          git config --global --add safe.directory '*'
          git config user.name 'zenvx-ci'
          git config user.email 'ci@users.noreply.github.com'
          git add -f ci-logs/latest-build.error.txt
          git commit -m 'ci: extracted build error [skip ci]' || echo 'nothing to commit'
          git push origin HEAD:main || echo 'push failed'
